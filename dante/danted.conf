# Dante SOCKS5 proxy — routes outbound traffic through the PPP interface.
#
# internal  → where SOCKS5 clients connect (all interfaces, port 1080)
# external  → which interface to use for outgoing connections (VPN tunnel)

logoutput: /proc/1/fd/2

internal: 0.0.0.0 port = 1080
external: ppp0

clientmethod: none
socksmethod: none

user.privileged: root
user.notprivileged: nobody

client pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    log: error
}

socks pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    command: bind connect udpassociate
    log: error
}
